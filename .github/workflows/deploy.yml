name: Build & Deploy GymTrack

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: nokijai

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/nokijai/gymtrack-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/nokijai/gymtrack-frontend:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd ~/gymtrack
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u nokijai --password-stdin
            docker-compose pull
            docker-compose down --remove-orphans
            docker-compose up -d
            # Ensure DB data directory is owned by noki so containers can read/write the bind-mount
            sudo chown -R noki:noki /home/noki/gymtrack-data/ 2>/dev/null || true
            docker image prune -f
