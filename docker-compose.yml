version: '3.8'

services:
  backend:
    image: ghcr.io/nokijai/gymtrack-backend:latest
    ports:
      - "5000:8000"
    volumes:
      # Bind-mount to host dir -- survives docker-compose down, docker volume prune, everything
      - /home/noki/gymtrack-data:/app/data
      # Avatar uploads persist across redeploys
      - /home/noki/gymtrack-data/uploads:/app/uploads
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    restart: unless-stopped

  frontend:
    image: ghcr.io/nokijai/gymtrack-frontend:latest
    ports:
      - "5001:3000"
    restart: unless-stopped
    depends_on:
      - backend
